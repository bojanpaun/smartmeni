name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Brzi: čiste JS funkcije ────────────────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  # ── Brzi: Deno edge logika (payment status-map) ────────────────────────────
  edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - run: deno test supabase/functions

  # ── Teži: pgTAP DB testovi (RLS, overbooking, folio) ───────────────────────
  # PREDUSLOV: test helperi moraju biti dostupni — vidi 0000_setup_test_helpers.sql
  # i napomenu o dbdev-u u supabase/tests/README.md.
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: supabase test db

  # ── Performanse: bundle budžet (hard gate) + Lighthouse (best-effort) ──────
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Dummy env — build ne smije pasti zbog nedostatka tajni; /login se
      # renderuje bez mreže (getSession čita lokalno, bez sesije → forma).
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_KEY: dummy-anon-key-for-ci-build
      # Hard gate: glavni bundle ne smije preći budžet (.size-limit.json)
      - run: npm run size
      # Best-effort: Lighthouse (mobilni) na /login — izvještaj, ne blokira
      - run: npx --yes @lhci/cli@0.14.x autorun
        continue-on-error: true

  # E2E (Playwright) namjerno NIJE ovdje — traži pokrenutu app + seedovan test
  # tenant. Dodaje se kao zaseban workflow kad budu spremni stvarni selektori.
