<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="rest.by.me — platforma za restorane i hotele: digitalni meni, rezervacije, hotel i spa." />
    <title>rest.by.me — platforma za restorane i hotele</title>

    <!-- PWA -->
    <meta name="theme-color" content="#0d7a52" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="rest.by.me" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Dark mode je admin-only — primijeni temu (bez flash-a) SAMO na admin rutama.
      // Javne stranice (login, landing, guest, booking) ostaju svijetle.
      try {
        var p = location.pathname;
        if (p.indexOf('/admin') === 0 || p.indexOf('/superadmin') === 0) {
          var scheme = localStorage.getItem('colorScheme') || 'green';
          var mode   = localStorage.getItem('mode')        || 'light';
          // Samo ugrađene palete imaju [data-theme] CSS blok. Custom palete
          // (theme_palettes) nemaju 'custom-x'/'custom-x-dark' blok — React/useTheme
          // ih inline override-uje preko zelene baze. Zato za custom koristimo bazni
          // 'green'/'green-dark' blok; bez ovoga bi dark mod bljesnuo SVIJETLOM temom
          // (nepostojeći 'custom-x-dark' → fallback na :root light).
          var BUILTIN = ['green', 'blue', 'purple'];
          var base = BUILTIN.indexOf(scheme) === -1 ? 'green' : scheme;
          var full = mode === 'dark' ? base + '-dark' : base;
          if (full !== 'green') document.documentElement.setAttribute('data-theme', full);
        }
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
