
[functions.send-booking-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-booking-email/deno.json"
entrypoint = "./functions/send-booking-email/index.ts"

# Webhook od Stripe dolazi bez JWT — verify_jwt mora biti false
[functions.payments-webhook]
enabled = true
verify_jwt = false

# Booking stranica poziva ovu funkciju sa anon tokenom (gost nije logovan)
[functions.payments-create-session]
enabled = true
verify_jwt = false

# Na povratku iz gateway-a — verifikacija plaćanja i kreiranje rezervacije
[functions.booking-finalize]
enabled = true
verify_jwt = false
